name: Rellu Release Helper - Lucode
description: Monorepo release analysis action with per-target changelogs, semver, and optional release PR automation.
author: lucas-labs

branding:
  icon: tag
  color: blue

inputs:
  github-token:
    required: false
    default: ${{ github.token }}
    description: |
      GitHub token for creating comments. Defaults to the automatic GITHUB_TOKEN.

  config-file:
    required: false
    default: ".github/rellu.json"
    description: | 
      Path to the configuration file within the repository (default: .github/rellu.json)

  from-ref:
    required: false
    description: |
      The git ref to compare against when determining what changes to include.

  to-ref:
    required: false
    default: "HEAD"
    description: |
      The git ref to compare against when determining what changes to include (default: HEAD).

  create-release-pr:
    required: false
    default: "false"
    description: | 
      Globally enable or disable creating/updating the release pull request for all targets. Explicit releasePr configuration
      for individual targets will override this global setting.

  no-bump-policy:
    required: false
    default: "skip"
    description: |
      Behavior for changed targets with no bump-worthy commits: skip|keep|patch

  range-strategy:
    required: false
    default: "latest-tag"
    description: |
        The strategy to determine the range of commits to analyze when the fromRef input is not provided.
        "explicit" means both fromRef and toRef must be provided.
        "latest-tag" means fromRef will be determined by finding the latest git tag in the repository, regardless of prefix.
        "latest-tag-with-prefix" means fromRef will be determined by finding the latest git tag that starts with the specified tagPrefix for each target.

  release-branch-prefix:
    required: false
    default: "rellu/release"
    description: |
      A global prefix for the release PR branch name (e.g. "rellu/"). Individual target configuration will override this if specified.

  strict-conventional-commits:
    required: false
    default: "false"
    description: |
      Fail when relevant commits are not valid conventional commits
  
  base-branch:
    required: false
    default: ${{ github.event.repository.default_branch }}
    description: |
      The base branch to use for the release PR (defaults to the default branch of the repository). Individual target configuration will override this if specified.

  repo:
    description: "GitHub repository slug owner/repo (defaults to GITHUB_REPOSITORY)"
    default: "${{ github.repository }}"
    required: false

  release-commit-message-pattern:
    description: "Pattern for release commit messages, with placeholders {target} and {version}"
    default: "release({target}): 🔖 v{version}"
    required: false

outputs:
  count-processed:
    description: "Number of processed targets"
  pr-updated:
    description: "count of targets for which an existing PR was updated"
  pr-created:
    description: "count of targets for which a new PR was created"
  changed-targets:
    description: "JSON array of changed target labels"
  has-changes:
    description: "true if at least one target changed"
  result-json:
    description: "Full JSON analysis result"

runs:
  using: "node20"
  main: "dist/index.js"
