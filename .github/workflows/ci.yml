name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install

      - name: Verify build, typecheck, and tests
        run: |
          bun run build
          bun run typecheck
          bun run test
